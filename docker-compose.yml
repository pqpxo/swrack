# version 20
name: cabinet-canvas
services:
  cabinet-db:
    image: postgres:16-alpine
    container_name: cabinet-canvas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cabinet_canvas}
      POSTGRES_USER: ${POSTGRES_USER:-cabinet_canvas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-now}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - cabinet_postgres_data:/var/lib/postgresql/data
    networks:
      - cabinet-canvas

  cabinet-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cabinet-canvas-api
    restart: unless-stopped
    depends_on:
      cabinet-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgresql://cabinet_canvas:change-me-now@cabinet-db:5432/cabinet_canvas?schema=public}
      ASSET_STORAGE_PATH: /data/assets
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8088}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - cabinet_asset_data:/data/assets
    cap_add:
      - NET_RAW
    networks:
      - cabinet-canvas

  cabinet-ui:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cabinet-canvas-ui
    restart: unless-stopped
    depends_on:
      cabinet-api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8088}:80"
    networks:
      - cabinet-canvas

volumes:
  cabinet_postgres_data:
  cabinet_asset_data:

networks:
  cabinet-canvas:
    name: cabinet-canvas
