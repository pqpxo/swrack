# version 3
server {
  listen 80;
  server_name _;
  client_max_body_size 12m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://cabinet-api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vite places the compiled interface files in /assets/. Serve existing UI files
  # locally and forward only missing /assets/ paths to the API's image storage.
  location /assets/ {
    try_files $uri @cabinet_api_uploaded_assets;
  }

  location @cabinet_api_uploaded_assets {
    proxy_pass http://cabinet-api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
